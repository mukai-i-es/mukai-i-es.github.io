<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>環境シミュレーションゲーム</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="intro">
  <h1>環境シミュレーションゲーム</h1>
  <p>あなたはこの街に新しく就任した市長です。<br>
    限られた予算（MONEY）の中で、環境（ENV）・経済（ECO）・市民生活（POP）のバランスを取りながら<br>
    街を発展させてください。</p>
  <button id="startBtn"> > start < </button>
  </div>

<div id="status">
  <p>ENV: <span id="env"></span></p>
  <p>ECO: <span id="eco"></span></p>
  <p>POP: <span id="pop"></span></p>
  <p>MONEY: <span id="money"></span></p>
</div>

<div id="paper">
  <h2 id="title"></h2>

  <img id="event-img" src="" alt="event image">

  <p id="description"></p>

  <div id="choices">
    <button id="choice0"></button><br>
    <button id="choice1"></button><br>
    <button id="choice2"></button><br>
  </div>
</div>

<button id="decideBtn">決定</button>

<div id="diff"></div>

<script src="events.js"></script>
<script src="game.js"></script>
</body>
</html>
